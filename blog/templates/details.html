{% extends 'base.html' %}
{% block content %}
<!-- 🔹 Main Content -->
<div class="container mt-4">
    <div class="row g-4">

        <!-- Blog Content -->
        <div class="col-lg-8">
            <div class="card p-4 shadow-sm">

                <h2 class="mb-2">
                    {{post.title}}
                    <small class="text-muted" style="font-size:16px;">
                        {{post.category.name}}
                    </small>
                </h2>

                <p class="text-muted">
                    Posted on {{post.created_at | date:"F j, Y"}}
                </p>

                <img style="width:800px; height:400px;" src="{{post.img_url}}"
                        class="blog-img mb-3"
                        alt="Blog Image">

                <p style="line-height: 1.8;">
                    {{post.content}}
                </p>

            </div>
        </div>

        <!-- Sidebar -->
    <div class="col-lg-4">

        <div class="card shadow-sm">
            <div class="card-body">
                <h5 class="card-title mb-3">Related Posts</h5>

                <ul class="list-group list-group-flush">
                    {% for related_post in related_posts %}
                    <li class="list-group-item">
                        <a href="{% url 'blog:detail' slug=related_post.slug %}" class="text-decoration-none">
                            {{related_post.title}}
                        </a>
                    </li>
                    {% endfor %}
                </ul>

            </div>
        </div>

    </div>

</div>
</div>
{% endblock %}
